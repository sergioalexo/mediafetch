name: Release

# Build the Windows installer and macOS bundle and publish them as a
# GitHub release whenever a version tag (v0.2.0, v1.0.0, ...) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            # Universal binary: runs natively on Apple Silicon and Intel.
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts so installed apps can self-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MediaFetch ${{ github.ref_name }}"
          releaseBody: |
            ## Which download do I need?

            | Your computer | Download this file |
            | --- | --- |
            | 🪟 **Windows** 10 / 11 (64-bit) | `MediaFetch_x.y.z_x64-setup.exe` |
            | 🍎 **macOS** (Apple Silicon + Intel) | `MediaFetch_x.y.z_universal.dmg` |

            The other files (`.sig`, `.app.tar.gz`, `latest.json`) are used by the in-app updater — you don't need to download them manually.

            ### 🪟 Windows
            Download the `.exe` and run it. If SmartScreen shows "Windows protected your PC", click **More info → Run anyway**.

            ### 🍎 macOS
            Download the `.dmg`, open it and drag **MediaFetch** to Applications. Because the app is not yet notarized by Apple, the first launch is blocked: open **System Settings → Privacy & Security**, scroll down and click **"Open Anyway"** next to the MediaFetch message (on macOS Sonoma and older you can instead right-click the app → **Open** → **Open**). This is only needed once.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Give the human-facing installers a clear, OS-labeled name on the release
      # page so people know which one to pick. Only the manual-download artifacts
      # are labeled; the updater files (the .exe/.app.tar.gz referenced by
      # latest.json) keep their original filenames so self-update keeps working.
      - name: Label installers by operating system
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          label_asset() {
            local suffix="$1" label="$2" url u
            url=$(gh release view "$TAG" --repo "$REPO" --json assets \
              -q ".assets[] | select(.name | endswith(\"$suffix\")) | .apiUrl")
            for u in $url; do
              gh api -X PATCH "$u" -f label="$label" >/dev/null
              echo "Labeled $u -> $label"
            done
          }
          if [ "${{ runner.os }}" = "Windows" ]; then
            label_asset "_x64-setup.exe" "Windows 10/11 installer (64-bit)"
          else
            label_asset "_universal.dmg" "macOS disk image (Apple Silicon + Intel)"
          fi
